name: homelab-api

services:
  homelab-api:
    build:
      context: .
    container_name: homelab-api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default
      - cf-tunnel

networks:
  cf-tunnel:
    external: true
    name: cf-tunnel
